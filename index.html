<!DOCTYPE html>
<html>
<head>
    <title>Reporte Estadístico - Ventas 2024</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .chart-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .chart-box { flex: 1; min-width: 300px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; height: auto; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #e9ecef; padding: 15px; border-radius: 8px; text-align: center; flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 Reporte Estadístico de Ventas 2024</h1>
    
    <div class="stats">
        <div class="stat-card">📈 Total Ventas: <strong>1080</strong></div>
        <div class="stat-card">📉 Promedio Mensual: <strong>216</strong></div>
        <div class="stat-card">⚠️ Máximo Error: <strong>12</strong></div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h3>Ventas por Mes (Barras)</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Tendencia Ventas vs Errores (Líneas)</h3>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Participación por Mes (Torta)</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <h3>Tabla de Datos</h3>
    <table id="data-table">
        <tr><th>Mes</th><th>Ventas</th><th>Errores</th></tr>
    </table>
</div>

<script>
    // Datos
    const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo'];
    const ventas = [120, 190, 300, 250, 220];
    const errores = [5, 8, 12, 7, 4];

    // Gráfico de barras
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: { labels: meses, datasets: [{ label: 'Ventas', data: ventas, backgroundColor: '#36A2EB' }] },
        options: { responsive: true, plugins: { legend: { position: 'top' } } }
    });

    // Gráfico de líneas
    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: { labels: meses, datasets: [
            { label: 'Ventas', data: ventas, borderColor: 'blue', fill: false },
            { label: 'Errores', data: errores, borderColor: 'red', fill: false }
        ]}
    });

    // Gráfico de torta
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: { labels: meses, datasets: [{ data: ventas, backgroundColor: ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF'] }] }
    });

    // Llenar tabla
    const table = document.getElementById('data-table');
    for (let i = 0; i < meses.length; i++) {
        let row = table.insertRow();
        row.insertCell(0).innerText = meses[i];
        row.insertCell(1).innerText = ventas[i];
        row.insertCell(2).innerText = errores[i];
    }
</script>
</body>
</html>
